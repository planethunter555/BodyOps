<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Body Ops</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="icon-wrap">
        <img src="./assets/body-ops-icon.png" alt="Body Ops app icon">
      </div>
      <div>
        <p class="eyebrow">Fitness and nutrition log</p>
        <h1>Body Ops</h1>
        <p class="lead">筋トレと食事をまとめて記録し、AIのアドバイスにつなげるフィットネス記録アプリです。</p>
      </div>
    </section>

    <section class="content">
      <h2>できること</h2>
      <ul>
        <li>筋トレの種目、重量、回数、セット数を記録</li>
        <li>食事内容、カロリー、PFCを記録</li>
        <li>体重、目標、履歴をまとめて振り返り</li>
        <li>APIキーを設定すると、記録をもとにAIアドバイスを利用可能</li>
        <li>APIキーなしでも通常の記録機能は利用可能</li>
      </ul>
    </section>

    <nav class="links" aria-label="Body Ops links">
      <a href="./support.html">サポート</a>
      <a href="./privacy.html">プライバシーポリシー</a>
    </nav>
  </main>
</body>
</html>
