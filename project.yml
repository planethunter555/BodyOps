name: BodyOps
options:
  bundleIdPrefix: com.bodyops
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BodyOps:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BodyOps
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bodyops.app
        INFOPLIST_FILE: BodyOps/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: BodyOps/Resources/BodyOps.entitlements

  BodyOpsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BodyOpsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bodyops.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BodyOps.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BodyOps"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: BodyOps
